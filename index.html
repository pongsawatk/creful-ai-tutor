<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1565C0">
  <meta name="description" content="ครูช่าง AI สำหรับหัวหน้าช่าง LAS">
  <title>ครูช่าง AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="top-app-bar">
      <div class="brand-mark" aria-hidden="true">
        <img src="Logo/Creful%20Logo.png" alt="">
      </div>
      <div class="brand-copy">
        <h1>ครูช่าง AI</h1>
        <p>Creful Site Co-pilot</p>
      </div>
      <div class="dev-badge" id="devBadge" hidden>MOCK MODE — ยังไม่ต่อ n8n</div>
      <div class="session-actions">
        <div class="session-pill" id="sessionPill">0</div>
        <button class="reset-session-button" id="resetSessionButton" type="button" aria-label="เริ่ม session ใหม่" title="เริ่ม session ใหม่">
          ↻
        </button>
      </div>
    </header>

    <main class="chat-panel" id="chatPanel" aria-live="polite">
      <section class="empty-state" id="emptyState">
        <div class="empty-intro">
          <p class="eyebrow">LAS Foreman AI Tutor</p>
          <h2>ถามเรื่องแบบ เอกสาร และสถานการณ์หน้างานได้ครับ</h2>
          <p>เลือกหัวข้อเร็ว หรือพิมพ์คำถามของคุณด้านล่างครับ</p>
        </div>
        <div class="quick-grid" id="quickGrid"></div>
      </section>
    </main>

    <footer class="composer-shell">
      <div class="status-line" id="statusLine">🟢 พร้อมตอบ</div>
      <form class="composer" id="composerForm" autocomplete="off">
        <label class="sr-only" for="messageInput">พิมพ์คำถาม</label>
        <textarea id="messageInput" rows="1" placeholder="พิมพ์คำถามหน้างานครับ" maxlength="500"></textarea>
        <button class="send-button" id="sendButton" type="submit" aria-label="ส่งคำถาม">
          ส่ง
        </button>
      </form>
    </footer>

    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>
  </div>

  <script>
    (() => {
      const runtimeConfig = typeof CONFIG !== "undefined" ? CONFIG : {};
      const config = {
        N8N_WEBHOOK_URL: runtimeConfig.N8N_WEBHOOK_URL || "",
        KB_BASE_URL: runtimeConfig.KB_BASE_URL || "",
        SHEET_WEBHOOK_URL: runtimeConfig.SHEET_WEBHOOK_URL || "",
        INPUT_MAX_LENGTH: Number(runtimeConfig.INPUT_MAX_LENGTH || 500)
      };

      const citationRegex = /\*\(📚 ข้อมูล: (\d+)% \| 🎯 มั่นใจ: (\d+)% \| 🔗 Ref: ([^)]+)\)\*/;
      const escalationRegex = /^ESCALATE:\s*(.+)$/im;
      const kbHintRegex = /(?:^|\n)\s*KB_HINT:\s*\n([\s\S]*?)\n\s*END_KB_HINT\s*(?=\n|$)/i;
      const lowKbWarningRegex = /^\s*⚠️[^\n]*ความรู้ทั่วไป[^\n]*\n?/m;
      const numberRegex = /\d+(?:[.,]\d+)?\s*(?:%|มม\.?|ซม\.?|เมตร|ม\.|MPa|N\/mm²|กก\.?|kg|m2|ตร\.ม\.|mm|cm)/i;
      const statusTimers = new Set();

      const storageKeys = {
        sessionId: "creful_session_id",
        history: "creful_chat_history",
        nickname: "creful_nickname",
        studentId: "creful_student_id",
        courseId: "creful_course_id",
        userMessageCount: "creful_user_message_count"
      };

      const quickActions = [
        {
          icon: "📘",
          title: "Module 1",
          text: "Drawing Fundamentals & Mindset",
          prompt: "ช่วยทบทวน Module 1 เรื่องพื้นฐานการอ่านแบบให้ผมแบบสั้น ๆ ครับ"
        },
        {
          icon: "📐",
          title: "Module 2",
          text: "Interior Drawing",
          prompt: "ช่วยอธิบาย Module 2 เรื่อง Interior Drawing ที่หัวหน้าช่างควรเช็คครับ"
        },
        {
          icon: "🔍",
          title: "Module 3",
          text: "Detail Drawings",
          prompt: "ช่วยสรุป Module 3 เรื่อง Detail Drawings และจุดที่ต้องระวังหน้างานครับ"
        },
        {
          icon: "📋",
          title: "Module 4",
          text: "BOQ / Spec / Document around Drawings",
          prompt: "ช่วยอธิบาย Module 4 เรื่อง BOQ, Spec และเอกสารรอบแบบครับ"
        },
        {
          icon: "🏗️",
          title: "Module 5",
          text: "Foreman Workflow & Site Operations",
          prompt: "ช่วยทบทวน Module 5 เรื่อง workflow หัวหน้าช่างและการเดินงานหน้างานครับ"
        },
        {
          icon: "🚨",
          title: "Scenario",
          text: "Scenario หน้างาน",
          prompt: "ผมเจอสถานการณ์หน้างาน ช่วยไล่ขั้นตอนตัดสินใจให้หน่อยครับ"
        },
        {
          icon: "🧪",
          title: "Quiz",
          text: "Quiz ทบทวน",
          prompt: "ช่วยถาม quiz ทบทวนความรู้หัวหน้าช่างให้ผมทีละข้อครับ"
        }
      ];

      const elements = {
        chatPanel: document.getElementById("chatPanel"),
        emptyState: document.getElementById("emptyState"),
        quickGrid: document.getElementById("quickGrid"),
        composerForm: document.getElementById("composerForm"),
        messageInput: document.getElementById("messageInput"),
        sendButton: document.getElementById("sendButton"),
        devBadge: document.getElementById("devBadge"),
        statusLine: document.getElementById("statusLine"),
        sessionPill: document.getElementById("sessionPill"),
        resetSessionButton: document.getElementById("resetSessionButton"),
        toast: document.getElementById("toast")
      };

      const state = {
        sessionId: getOrCreateSessionId(),
        studentId: "",
        courseId: "",
        nickname: "",
        mode: "AWAITING_NAME",
        history: readJson(storageKeys.history, []),
        userMessageCount: Number(localStorage.getItem(storageKeys.userMessageCount) || 0),
        isThinking: false
      };

      init();

      function init() {
        applyUrlParams();
        state.studentId = localStorage.getItem(storageKeys.studentId) || "";
        state.courseId = localStorage.getItem(storageKeys.courseId) || "";
        state.nickname = localStorage.getItem(storageKeys.nickname) || "";
        state.mode = state.nickname ? "ACTIVE" : "AWAITING_NAME";
        state.userMessageCount = Math.max(state.userMessageCount, countUserMessages(state.history));

        elements.messageInput.maxLength = config.INPUT_MAX_LENGTH;
        renderQuickActions();
        renderHistory();
        updateSessionUi();
        updateComposerState();
        updateMockBadge();

        if (state.mode === "AWAITING_NAME" && state.history.length === 0) {
          renderNamePrompt();
        }

        elements.composerForm.addEventListener("submit", handleSubmit);
        elements.messageInput.addEventListener("input", autoGrowInput);
        elements.messageInput.addEventListener("paste", handlePaste);
        elements.messageInput.addEventListener("keydown", handleEnterKey);
        elements.resetSessionButton.addEventListener("click", resetSession);
      }

      function handleEnterKey(event) {
        if (event.key !== "Enter" || event.isComposing) return;
        if (!isDesktopPointer()) return;
        if (event.altKey || event.shiftKey) return;
        event.preventDefault();
        if (typeof elements.composerForm.requestSubmit === "function") {
          elements.composerForm.requestSubmit();
        } else {
          handleSubmit(new Event("submit", { cancelable: true }));
        }
      }

      function isDesktopPointer() {
        try {
          return window.matchMedia("(hover: hover) and (pointer: fine)").matches;
        } catch {
          return false;
        }
      }

      function applyUrlParams() {
        const params = new URLSearchParams(window.location.search);
        persistParam(params, "student_id", storageKeys.studentId);
        persistParam(params, "course_id", storageKeys.courseId);
        persistParam(params, "nickname", storageKeys.nickname);
      }

      function persistParam(params, paramName, key) {
        const value = params.get(paramName);
        if (value && value.trim()) {
          localStorage.setItem(key, value.trim());
        }
      }

      function getOrCreateSessionId() {
        const existing = localStorage.getItem(storageKeys.sessionId);
        if (existing) return existing;
        const generated = createSessionId();
        localStorage.setItem(storageKeys.sessionId, generated);
        return generated;
      }

      function createSessionId() {
        return `creful_${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
      }

      function readJson(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch (error) {
          console.warn("Cannot read localStorage JSON", key, error);
          return fallback;
        }
      }

      function saveHistory() {
        localStorage.setItem(storageKeys.history, JSON.stringify(state.history));
      }

      function countUserMessages(history) {
        return history.filter((item) => item.role === "user").length;
      }

      function renderQuickActions() {
        elements.quickGrid.innerHTML = "";
        quickActions.forEach((action) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "quick-card";
          button.innerHTML = `
            <span class="quick-icon" aria-hidden="true">${action.icon}</span>
            <span class="quick-title">${action.title}</span>
            <span class="quick-text">${action.text}</span>
          `;
          button.addEventListener("click", () => {
            if (state.mode !== "ACTIVE") {
              showToast("บอกชื่อเล่นก่อนเลือกหัวข้อครับ");
              elements.messageInput.focus();
              return;
            }
            sendText(action.prompt);
          });
          elements.quickGrid.appendChild(button);
        });
      }

      function renderNamePrompt() {
        const prompt = {
          role: "bot",
          content: "สวัสดีครับ ผมครูช่าง AI บอกชื่อเล่นก่อนเริ่มถามงานได้ครับ",
          meta: { system: true }
        };
        renderMessage(prompt);
        elements.messageInput.placeholder = "พิมพ์ชื่อเล่นครับ";
      }

      function renderHistory() {
        Array.from(elements.chatPanel.querySelectorAll(".message-group")).forEach((node) => node.remove());
        state.history.forEach(renderMessage);
        toggleEmptyState();
        scrollToBottom();
      }

      function renderMessage(message) {
        const group = document.createElement("article");
        group.className = `message-group ${message.role === "user" ? "is-user" : "is-bot"}`;

        if (message.role === "user") {
          const bubble = document.createElement("div");
          bubble.className = "bubble";
          bubble.textContent = message.content || "";
          group.appendChild(bubble);
          elements.chatPanel.appendChild(group);
          toggleEmptyState();
          scrollToBottom();
          return;
        }

        const meta = message.meta || {};
        const card = document.createElement("div");
        card.className = "bot-card";
        if (meta.error) card.classList.add("is-error");
        if (meta.escalated) card.classList.add("is-escalated");
        if (meta.kb_relevance !== undefined && meta.kb_relevance < 50) {
          card.classList.add("is-low-kb");
          card.appendChild(createTrustWarning());
        }

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        renderRichText(bubble, message.content || "");

        if (meta.kb_hint) {
          const extra = document.createElement("div");
          extra.className = "extra-info";
          const intro = document.createElement("p");
          intro.className = "extra-info-intro";
          intro.textContent = "ℹ️ จากฐานความรู้ Creful แนะนำเพิ่ม";
          extra.appendChild(intro);
          const body = document.createElement("div");
          body.className = "extra-info-body";
          renderRichText(body, meta.kb_hint);
          extra.appendChild(body);
          bubble.appendChild(extra);
        }

        card.appendChild(bubble);

        if (meta.showEngineerCta) {
          card.appendChild(createEngineerCta());
        }

        if (meta.kb_relevance !== undefined && meta.confidence !== undefined && meta.doc_id) {
          card.appendChild(createCitationChip(meta));
        }

        group.appendChild(card);

        if (!meta.system) {
          group.appendChild(createFeedbackButtons(message));
        }

        elements.chatPanel.appendChild(group);
        toggleEmptyState();
        scrollToBottom();
      }

      function renderRichText(container, text) {
        const escaped = escapeHtml(normalizeTextLayout(text || "")).trim();
        if (!escaped) {
          container.textContent = "";
          return;
        }
        const blocks = escaped.split(/\n{2,}/);
        const html = blocks.map(renderBlock).join("");
        container.innerHTML = html;
      }

      function renderBlock(block) {
        const lines = block.split(/\n/).map((line) => line.trim()).filter(Boolean);
        let html = "";
        let paragraphLines = [];
        let listType = "";
        let listItems = [];
        let listStart = null;

        const flushParagraph = () => {
          if (!paragraphLines.length) return;
          const isHeading = paragraphLines.length === 1 && isHeadingLine(paragraphLines[0]);
          const tag = isHeading ? "p class=\"rich-heading\"" : "p";
          html += `<${tag}>${paragraphLines.map(formatInline).join("<br>")}</p>`;
          paragraphLines = [];
        };

        const flushList = () => {
          if (!listItems.length) return;
          const tag = listType === "ol" ? "ol" : "ul";
          const startAttr = tag === "ol" && listStart && listStart > 1 ? ` start="${listStart}"` : "";
          html += `<${tag}${startAttr}>${listItems.map((item) => `<li>${formatInline(item)}</li>`).join("")}</${tag}>`;
          listType = "";
          listItems = [];
          listStart = null;
        };

        lines.forEach((line) => {
          const ordered = line.match(/^\s*(\d+)[.)]\s+(.+)$/);
          const choice = line.match(/^\s*([A-D])[.)]\s+(.+)$/);
          const bullet = line.match(/^\s*[-*•]\s+(.+)$/);

          if (ordered || choice || bullet) {
            const nextType = ordered ? "ol" : "ul";
            flushParagraph();
            if (listType && listType !== nextType) flushList();
            if (!listType && ordered) listStart = Number(ordered[1]);
            listType = nextType;
            listItems.push(choice ? `${choice[1]}) ${choice[2]}` : (ordered ? ordered[2] : bullet[1]));
            return;
          }

          flushList();
          paragraphLines.push(line);
        });

        flushParagraph();
        flushList();
        return html;
      }

      function normalizeTextLayout(text) {
        return String(text || "")
          .replace(/\r\n/g, "\n")
          .replace(/([^\n])\s+(\d+[.)]\s+)/g, "$1\n$2")
          .replace(/([^\n])\s+([A-D][.)]\s+)/g, "$1\n$2")
          .replace(/([^\n])\s+(•\s+)/g, "$1\n$2")
          .replace(/\n{3,}/g, "\n\n");
      }

      function isHeadingLine(line) {
        return line.length <= 48 && /[:：]$/.test(line);
      }

      function formatInline(text) {
        return text
          .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
          .replace(/__([^_]+)__/g, "<strong>$1</strong>")
          .replace(/(^|[\s(])\*([^*\n]+)\*(?=[\s).,!?:;\]]|$)/g, "$1<em>$2</em>")
          .replace(/(^|[\s(])_([^_\n]+)_(?=[\s).,!?:;\]]|$)/g, "$1<em>$2</em>")
          .replace(/`([^`]+)`/g, "<code>$1</code>");
      }

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function createTrustWarning() {
        const warning = document.createElement("div");
        warning.className = "trust-warning";
        warning.textContent = "⚠️ ข้อมูลส่วนใหญ่จากความรู้ทั่วไป กรุณาตรวจซ้ำก่อนใช้จริงครับ";
        return warning;
      }

      function createCitationChip(meta) {
        const chip = document.createElement("div");
        chip.className = `citation-chip ${meta.kb_relevance < 50 ? "is-warning" : ""}`;
        chip.textContent = `📚 ${meta.kb_relevance}% | 🎯 ${meta.confidence}% | 🔗 ${meta.doc_id}`;
        return chip;
      }

      function createEngineerCta() {
        const chip = document.createElement("div");
        chip.className = "engineer-chip";
        chip.textContent = "🧑‍💼 ตรวจกับวิศวกรก่อนใช้จริง";
        return chip;
      }

      function createFeedbackButtons(message) {
        const feedback = document.createElement("div");
        feedback.className = "feedback-row";
        const meta = message?.meta || {};
        [
          {
            type: "understood",
            label: "👍 เข้าใจแล้ว",
            action: "log_positive",
            toast: "บันทึกว่าเข้าใจแล้วครับ"
          },
          {
            type: "unclear",
            label: "🔁 อธิบายใหม่",
            action: "request_rewrite",
            prompt: "คำตอบเมื่อกี้ยังไม่ชัดครับ ช่วยอธิบายใหม่ให้ง่ายขึ้น เป็นภาษาไทยหน้างาน และสรุปเป็นขั้นตอนสั้น ๆ ครับ",
            toast: "ให้ครูช่างอธิบายใหม่ครับ"
          },
          {
            type: "example",
            label: "🧩 ขอตัวอย่าง",
            action: "request_example",
            prompt: "ช่วยยกตัวอย่างหน้างานจากคำตอบเมื่อกี้ 1 ตัวอย่าง พร้อมวิธีคิดแบบหัวหน้าช่างครับ",
            toast: "ขอตัวอย่างหน้างานครับ"
          },
          {
            type: "report_wrong",
            label: "📝 คำตอบผิด",
            action: "trainer_review",
            toast: "รับแจ้งแล้วครับ ทีมจะใช้ข้อมูลนี้ตรวจคำตอบ"
          }
        ].forEach((action) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "feedback-button";
          button.textContent = action.label;
          button.addEventListener("click", () => {
            if (state.isThinking) {
              showToast("รอคำตอบปัจจุบันจบก่อนครับ");
              return;
            }

            button.classList.add("is-selected");
            logEvent("feedback", {
              message_id: message?.id,
              feedback_type: action.type,
              feedback_label: action.label,
              feedback_action: action.action,
              question: findQuestionForBotMessage(message),
              answer: message?.content || "",
              trace_id: meta.trace_id || "",
              doc_id: meta.doc_id || "",
              kb_relevance: meta.kb_relevance,
              confidence: meta.confidence,
              model: meta.model || ""
            });
            showToast(action.toast);

            if (action.prompt) {
              sendText(action.prompt);
            }
          });
          feedback.appendChild(button);
        });
        return feedback;
      }

      function findQuestionForBotMessage(message) {
        const messageIndex = state.history.findIndex((item) => item.id === message?.id);
        const searchFrom = messageIndex >= 0 ? messageIndex - 1 : state.history.length - 1;

        for (let index = searchFrom; index >= 0; index -= 1) {
          if (state.history[index]?.role === "user") {
            return state.history[index].content || "";
          }
        }

        return "";
      }

      function toggleEmptyState() {
        const hasMessages = state.history.length > 0 || elements.chatPanel.querySelector(".message-group");
        elements.emptyState.hidden = hasMessages;
      }

      async function handleSubmit(event) {
        event.preventDefault();
        const text = elements.messageInput.value.trim();
        if (!text || state.isThinking) return;
        await sendText(text);
      }

      async function sendText(text) {
        clearInput();

        if (state.mode === "AWAITING_NAME") {
          state.nickname = text.slice(0, config.INPUT_MAX_LENGTH);
          localStorage.setItem(storageKeys.nickname, state.nickname);
          state.mode = "ACTIVE";
          elements.messageInput.placeholder = "พิมพ์คำถามหน้างานครับ";
          const greeting = {
            id: createMessageId(),
            role: "bot",
            content: `ยินดีครับ ${state.nickname} ถามเรื่องแบบ เอกสาร หรือสถานการณ์หน้างานได้เลยครับ`,
            meta: { system: true }
          };
          renderMessage(greeting);
          showToast("เริ่มใช้งานได้ครับ");
          return;
        }

        const userMessage = {
          id: createMessageId(),
          role: "user",
          content: text,
          created_at: new Date().toISOString()
        };

        state.history.push(userMessage);
        state.userMessageCount += 1;
        localStorage.setItem(storageKeys.userMessageCount, String(state.userMessageCount));
        saveHistory();
        renderMessage(userMessage);
        updateSessionUi();

        await callWebhook(text);
      }

      async function callWebhook(text) {
        const startedAt = performance.now();
        state.isThinking = true;
        updateComposerState();
        setStatus("thinking");
        showTypingIndicator();

        const payload = {
          session_id: state.sessionId,
          student_id: state.studentId,
          course_id: state.courseId,
          nickname: state.nickname,
          message: text,
          history: state.history.slice(-20).map(({ role, content }) => ({ role, content })),
          citation_parse_failed: false
        };

        try {
          if (isMockMode()) {
            await wait(350);
            const botMessage = normalizeBotResponse(getMockResponse(text));
            botMessage.meta.response_time_ms = Math.round(performance.now() - startedAt);
            finishBotMessage(botMessage);
            return;
          }

          const response = await fetch(config.N8N_WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            throw new Error(`Webhook failed with ${response.status}`);
          }

          const raw = await readWebhookResponse(response);
          const botMessage = normalizeBotResponse(raw);
          botMessage.meta.response_time_ms = Math.round(performance.now() - startedAt);
          finishBotMessage(botMessage);
        } catch (error) {
          console.error(error);
          setStatus("error");
          finishBotMessage({
            id: createMessageId(),
            role: "bot",
            content: "ระบบขัดข้องหรือยังไม่ได้ตั้งค่า Webhook ครับ กรุณาลองใหม่หลังตรวจค่า CONFIG.N8N_WEBHOOK_URL ครับ",
            created_at: new Date().toISOString(),
            meta: {
              citation_parse_failed: true,
              showEngineerCta: false,
              error: true
            }
          });
        } finally {
          hideTypingIndicator();
          state.isThinking = false;
          updateComposerState();
        }
      }

      function showTypingIndicator() {
        if (document.getElementById("typingIndicator")) return;
        const group = document.createElement("article");
        group.className = "message-group is-bot is-typing";
        group.id = "typingIndicator";
        group.setAttribute("aria-label", "ครูช่างกำลังพิมพ์");
        const card = document.createElement("div");
        card.className = "bot-card typing-card";
        const indicator = document.createElement("div");
        indicator.className = "typing-indicator";
        indicator.innerHTML = "<span></span><span></span><span></span>";
        const label = document.createElement("span");
        label.className = "typing-label";
        label.textContent = "ครูช่างกำลังคิดอยู่ครับ";
        card.append(indicator, label);
        group.appendChild(card);
        elements.chatPanel.appendChild(group);
        scrollToBottom();
      }

      function hideTypingIndicator() {
        const node = document.getElementById("typingIndicator");
        if (node) node.remove();
      }

      async function readWebhookResponse(response) {
        const contentType = response.headers.get("content-type") || "";
        if (contentType.includes("application/json")) {
          return response.json();
        }
        const text = await response.text();
        try {
          return JSON.parse(text);
        } catch {
          return text;
        }
      }

      function isMockMode() {
        const params = new URLSearchParams(window.location.search);
        return !config.N8N_WEBHOOK_URL || params.get("mock") === "1";
      }

      function updateMockBadge() {
        elements.devBadge.hidden = !isMockMode();
      }

      function getMockResponse(message) {
        if (message.includes("citation") || message.includes("RFI")) {
          return "ควรออก RFI ก่อนเริ่มทำงานครับ\n\nควรทำแบบนี้ครับ:\n- ถ่ายรูปจุดที่ขัดกันไว้เป็นหลักฐาน\n- ระบุแบบหรือเอกสารที่ไม่ตรงกัน\n- ส่งคำถามให้ PM หรือ Designer ยืนยันก่อนเริ่มงาน\n\nKB_HINT:\n- ใช้ RFI เมื่อแบบหรือเอกสารไม่ชัดเจน และต้องรอคำตอบก่อนตัดสินใจหน้างาน\nEND_KB_HINT\n\n*(📚 ข้อมูล: 85% | 🎯 มั่นใจ: 92% | 🔗 Ref: Foreman_M4.1_TriangleCheck)*";
        }

        if (message.includes("low")) {
          return "ข้อมูลในคู่มือยังครอบคลุมไม่ครบครับ แนะนำให้ถาม PM ประกอบก่อนใช้จริง\n\n*(📚 ข้อมูล: 42% | 🎯 มั่นใจ: 68% | 🔗 Ref: ความรู้ทั่วไป)*";
        }

        if (message.includes("escalate")) {
          return "อย่าเพิ่งทำเองครับ เคสนี้ต้องให้ผู้เกี่ยวข้องตรวจสอบก่อน\nESCALATE: Fire-rated / Structural safety\n\n*(📚 ข้อมูล: 25% | 🎯 มั่นใจ: 60% | 🔗 Ref: Escalation_Matrix)*";
        }

        return "รับทราบครับ นี่คือคำตอบทดสอบจาก mock mode\n\n*(📚 ข้อมูล: 80% | 🎯 มั่นใจ: 88% | 🔗 Ref: Mock_Test)*";
      }

      function wait(ms) {
        return new Promise((resolve) => window.setTimeout(resolve, ms));
      }

      function normalizeBotResponse(raw) {
        const isObject = raw && typeof raw === "object" && !Array.isArray(raw);
        let answer = isObject ? String(raw.answer || raw.message || "") : String(raw || "");
        if (!answer.trim()) {
          answer = "ยังไม่ได้รับคำตอบจากระบบครับ";
        }

        const parsedEscalation = parseEscalation(answer);
        answer = parsedEscalation.answer;

        const parsedKbHint = parseKbHint(answer);
        answer = parsedKbHint.answer;

        const parsedCitation = parseCitation(answer);
        answer = parsedCitation.answer;

        answer = stripLowKbWarning(answer);
        const kbHint = normalizeKbHint(isObject ? (raw.kb_hint || raw.kb_extra || parsedKbHint.kb_hint) : parsedKbHint.kb_hint);

        const structuredCitation = isObject && hasStructuredCitation(raw)
          ? {
              kb_relevance: Number(raw.kb_relevance),
              confidence: Number(raw.confidence),
              doc_id: String(raw.doc_id)
            }
          : null;

        const citation = structuredCitation || parsedCitation.citation;
        const citationParseFailed = !citation && !structuredCitation;
        const escalated = Boolean(isObject && raw.escalate) || parsedEscalation.escalated;
        const escalateReason = String((isObject && raw.escalate_reason) || parsedEscalation.reason || "");
        const confidence = citation ? Number(citation.confidence) : undefined;
        const kbRelevance = citation ? Number(citation.kb_relevance) : undefined;
        const showEngineerCta = (confidence !== undefined && confidence < 70) || numberRegex.test(answer);

        return {
          id: createMessageId(),
          role: "bot",
          content: answer.trim(),
          created_at: new Date().toISOString(),
          meta: {
            kb_relevance: kbRelevance,
            confidence,
            doc_id: citation?.doc_id,
            model: isObject ? raw.model : "",
            trace_id: isObject ? raw.trace_id : "",
            escalated,
            escalate_reason: escalateReason,
            kb_hint: kbHint,
            citation_parse_failed: citationParseFailed,
            showEngineerCta
          }
        };
      }

      function parseKbHint(answer) {
        const match = answer.match(kbHintRegex);
        if (!match) {
          return { answer, kb_hint: "" };
        }
        return {
          answer: answer.replace(kbHintRegex, "").trim(),
          kb_hint: match[1].trim()
        };
      }

      function normalizeKbHint(value) {
        return String(value || "")
          .replace(/\r\n/g, "\n")
          .split("\n")
          .map((line) => line.replace(/^\s*(?:[-*•]|\d+[.)])\s*/, "").trim())
          .filter(Boolean)
          .slice(0, 2)
          .map((line) => `- ${line.length > 180 ? `${line.slice(0, 177).trim()}...` : line}`)
          .join("\n");
      }

      function hasStructuredCitation(raw) {
        return raw.kb_relevance !== undefined && raw.confidence !== undefined && raw.doc_id !== undefined;
      }

      function parseCitation(answer) {
        const match = answer.match(citationRegex);
        if (!match) {
          return { answer, citation: null };
        }
        return {
          answer: answer.replace(citationRegex, "").trim(),
          citation: {
            kb_relevance: Number(match[1]),
            confidence: Number(match[2]),
            doc_id: match[3].trim()
          }
        };
      }

      function parseEscalation(answer) {
        const match = answer.match(escalationRegex);
        if (!match) {
          return { answer, escalated: false, reason: "" };
        }
        return {
          answer: answer.replace(escalationRegex, "").trim(),
          escalated: true,
          reason: match[1].trim()
        };
      }

      function stripLowKbWarning(answer) {
        return answer.replace(lowKbWarningRegex, "").trim();
      }

      function finishBotMessage(botMessage) {
        state.history.push(botMessage);
        saveHistory();
        renderMessage(botMessage);

        if (botMessage.meta?.kb_relevance < 50) {
          setStatus("partial");
        } else if (!botMessage.meta?.error) {
          setStatus("default", true);
        }

        logEvent("bot_response", {
          session_id: state.sessionId,
          response_time_ms: botMessage.meta?.response_time_ms,
          kb_relevance: botMessage.meta?.kb_relevance,
          confidence: botMessage.meta?.confidence,
          doc_id: botMessage.meta?.doc_id,
          model: botMessage.meta?.model,
          escalated: Boolean(botMessage.meta?.escalated),
          escalate_reason: botMessage.meta?.escalate_reason || "",
          citation_parse_failed: Boolean(botMessage.meta?.citation_parse_failed)
        });
      }

      function setStatus(type, delayDefault = false) {
        statusTimers.forEach((timer) => clearTimeout(timer));
        statusTimers.clear();

        const labels = {
          default: "🟢 พร้อมตอบ",
          thinking: "⏳ กำลังคิด...",
          partial: "⚠️ ข้อมูลส่วนใหญ่จากความรู้ทั่วไป",
          error: "🔴 ระบบขัดข้อง กรุณาลองใหม่"
        };
        elements.statusLine.textContent = labels[type] || labels.default;
        elements.statusLine.dataset.status = type;

        if (type !== "default" || delayDefault) {
          const timer = setTimeout(() => {
            elements.statusLine.textContent = labels.default;
            elements.statusLine.dataset.status = "default";
            statusTimers.delete(timer);
          }, 3000);
          statusTimers.add(timer);
        }
      }

      function updateComposerState() {
        elements.messageInput.disabled = state.isThinking;
        elements.sendButton.disabled = state.isThinking;
        elements.resetSessionButton.disabled = state.isThinking;
        if (state.mode === "AWAITING_NAME") {
          elements.messageInput.placeholder = "พิมพ์ชื่อเล่นครับ";
        } else {
          elements.messageInput.placeholder = "พิมพ์คำถามหน้างานครับ";
        }
      }

      function updateSessionUi() {
        elements.sessionPill.textContent = `${state.userMessageCount}`;
      }

      function resetSession() {
        if (state.isThinking) return;

        state.sessionId = createSessionId();
        state.history = [];
        state.userMessageCount = 0;
        state.mode = state.nickname ? "ACTIVE" : "AWAITING_NAME";

        localStorage.setItem(storageKeys.sessionId, state.sessionId);
        localStorage.removeItem(storageKeys.history);
        localStorage.removeItem(storageKeys.userMessageCount);

        Array.from(elements.chatPanel.querySelectorAll(".message-group")).forEach((node) => node.remove());
        renderHistory();
        if (state.mode === "AWAITING_NAME") {
          renderNamePrompt();
        }
        updateComposerState();
        updateSessionUi();
        setStatus("default");
        showToast("เริ่ม session ใหม่แล้วครับ");
        elements.messageInput.focus();
      }

      function handlePaste(event) {
        const pasted = event.clipboardData?.getData("text") || "";
        if (pasted.length <= config.INPUT_MAX_LENGTH) return;

        event.preventDefault();
        const textarea = elements.messageInput;
        const current = textarea.value;
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        const nextValue = `${current.slice(0, start)}${pasted}${current.slice(end)}`;
        textarea.value = nextValue.slice(0, config.INPUT_MAX_LENGTH);
        autoGrowInput();
        showToast(`ตัดข้อความให้เหลือ ${config.INPUT_MAX_LENGTH} ตัวอักษรครับ`);
      }

      function autoGrowInput() {
        const input = elements.messageInput;
        input.style.height = "auto";
        input.style.height = `${Math.min(input.scrollHeight, 140)}px`;
      }

      function clearInput() {
        elements.messageInput.value = "";
        autoGrowInput();
      }

      function createMessageId() {
        return `msg_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
      }

      function scrollToBottom() {
        requestAnimationFrame(() => {
          elements.chatPanel.scrollTop = elements.chatPanel.scrollHeight;
        });
      }

      function showToast(message) {
        elements.toast.textContent = message;
        elements.toast.hidden = false;
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(() => {
          elements.toast.hidden = true;
        }, 2800);
      }

      function logEvent(eventName, payload) {
        const eventPayload = {
          event: eventName,
          session_id: state.sessionId,
          student_id: state.studentId,
          course_id: state.courseId,
          nickname: state.nickname,
          timestamp: new Date().toISOString(),
          ...payload
        };
        console.log("[creful-log]", eventPayload);

        if (eventName === "feedback" && config.SHEET_WEBHOOK_URL) {
          try {
            fetch(config.SHEET_WEBHOOK_URL, {
              method: "POST",
              mode: "no-cors",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(eventPayload),
              keepalive: true
            }).catch((error) => console.warn("[creful-log] sheet post failed", error));
          } catch (error) {
            console.warn("[creful-log] sheet post threw", error);
          }
        }
      }
    })();
  </script>
</body>
</html>
